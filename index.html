<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stemming Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--border:#2a2a2a;
  --text:#f0f0f0;--muted:#666;--muted2:#888;
  --accent:#c8f560;--accent-dim:#8aab35;
  --danger:#ff5c5c;--warning:#f0a04b;--success:#4bdd8a;
  --orange:#ff8c42;--blue:#7ec8f0;--purple:#b39dfc;
  --radius:10px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;left:0;top:0;height:100vh;
  width:56px;
  background:var(--surface);
  border-right:1px solid var(--border);
  transition:width 0.25s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
  z-index:100;
  display:flex;flex-direction:column;
}
#sidebar.open{width:240px;}
#sidebar-toggle{
  display:flex;align-items:center;gap:12px;
  padding:16px 18px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
  min-height:56px;
  flex-shrink:0;
}
#sidebar-toggle-label{
  font-family:var(--mono);font-size:0.72rem;color:var(--muted2);
  text-transform:uppercase;letter-spacing:0.1em;
  white-space:nowrap;opacity:0;transition:opacity 0.15s;
}
#sidebar.open #sidebar-toggle-label{opacity:1;transition-delay:0.1s;}
#sidebar-toggle-icon{
  font-size:18px;color:var(--muted2);flex-shrink:0;
  transition:transform 0.25s;
  width:20px;text-align:center;
}
#sidebar.open #sidebar-toggle-icon{transform:rotate(180deg);}
#sidebar-content{
  padding:12px 10px;overflow-y:auto;flex:1;
  opacity:0;transition:opacity 0.15s;pointer-events:none;
}
#sidebar.open #sidebar-content{opacity:1;pointer-events:all;transition-delay:0.1s;}
.sb-section{font-size:0.72rem;color:var(--text);font-family:var(--mono);font-weight:500;text-transform:uppercase;letter-spacing:0.08em;padding:10px 8px 6px;white-space:nowrap;}
.sb-section:first-child{padding-top:4px;}
.sb-btn{
  display:block;width:100%;padding:9px 10px;
  border-radius:8px;border:1px solid transparent;
  background:transparent;color:var(--muted2);
  cursor:pointer;font-family:var(--mono);font-size:0.72rem;
  text-align:left;white-space:nowrap;
  transition:all 0.15s;margin-bottom:4px;
  line-height:1.4;
}
.sb-btn:hover{background:var(--surface2);color:var(--text);}
.sb-btn .sb-name{display:block;font-weight:500;}
.sb-btn .sb-sub{display:block;font-size:0.62rem;opacity:0.6;margin-top:1px;}
.sb-btn.active-easy{border-color:var(--accent);color:var(--accent);background:#1a200a;}
.sb-btn.active-hard{border-color:var(--blue);color:var(--blue);background:#0a1520;}
.sb-btn.active-mc-easy{border-color:var(--purple);color:var(--purple);background:#120f1f;}
.sb-btn.active-mc-hard{border-color:#c084f5;color:#c084f5;background:#180f22;}
.sb-btn.active-wrong-easy{border-color:var(--orange);color:var(--orange);background:#1f130a;}
.sb-btn.active-wrong-hard{border-color:var(--danger);color:var(--danger);background:#1f0a0a;}
.wb{display:inline-block;background:#2a1a0a;color:var(--orange);border:1px solid #4a2a10;border-radius:20px;font-size:0.62rem;padding:1px 6px;margin-left:4px;vertical-align:middle;}

/* ── MAIN ── */
header{text-align:center;margin-bottom:1.5rem;}
header h1{font-family:var(--mono);font-size:clamp(1.5rem,4vw,2.2rem);font-weight:500;color:var(--accent);margin-bottom:0.3rem;letter-spacing:-0.02em;}
.countdown-title{display:flex;justify-content:center;gap:5px;margin-bottom:0.5rem;}
.countdown-tile{
  display:inline-flex;align-items:center;justify-content:center;
  width:clamp(32px,6vw,48px);height:clamp(32px,6vw,48px);
  background:#1a5fbf;
  border-radius:4px;
  font-family:var(--mono);
  font-size:clamp(1rem,3.5vw,1.6rem);
  font-weight:500;
  color:#fff;
  letter-spacing:0;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.15);
  border:1px solid #1248a0;
}
#mode-label{font-size:0.82rem;font-family:var(--mono);font-weight:500;}
.ml-easy{color:var(--accent);}
.ml-hard{color:var(--blue);}
.ml-mc-easy{color:var(--purple);}
.ml-mc-hard{color:#c084f5;}
.ml-wrong-easy{color:var(--orange);}
.ml-wrong-hard{color:var(--danger);}
.container{width:100%;max-width:540px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;}
.stat-label{font-size:0.68rem;color:var(--muted2);font-family:var(--mono);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
.stat-val{font-size:1.4rem;font-weight:500;font-family:var(--mono);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.card-label{font-size:0.68rem;color:var(--muted2);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem;}
.badge{display:inline-block;border-radius:6px;font-size:0.7rem;font-family:var(--mono);padding:3px 10px;margin-bottom:0.75rem;}
.bff{background:#1a0f0f;color:#ff9a6c;border:1px solid #5a2a1a;}
.bwr{background:#1f130a;color:var(--orange);border:1px solid #5a2a10;}
.bmc{background:#120f1f;color:var(--purple);border:1px solid #4a3a7a;}
#base-display{font-family:var(--mono);font-size:clamp(1.1rem,3vw,1.5rem);font-weight:500;color:var(--text);line-height:1.6;word-break:break-all;}
.nl{display:inline-block;background:#1a200a;color:var(--accent);border:1px solid var(--accent-dim);border-radius:6px;padding:1px 8px;font-size:0.9em;margin:0 2px;}
.nl-purple{display:inline-block;background:#1a1030;color:var(--purple);border:1px solid #6a4aaa;border-radius:6px;padding:1px 8px;font-size:0.9em;margin:0 2px;}
#scrambled-display{font-family:var(--mono);font-size:clamp(1.3rem,4vw,1.9rem);font-weight:500;color:var(--text);letter-spacing:0.15em;word-break:break-all;}
.timer-row{display:flex;align-items:center;gap:12px;margin-bottom:0.75rem;}
.timer-num{font-family:var(--mono);font-size:0.85rem;color:var(--muted2);min-width:26px;text-align:right;}
.timer-track{flex:1;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
#timer-bar{height:3px;width:100%;border-radius:2px;transition:width 0.1s linear,background 0.3s;}
.typing-indicator{font-size:0.68rem;font-family:var(--mono);color:var(--muted);min-height:16px;margin-bottom:6px;transition:color 0.2s;}
.typing-indicator.active{color:var(--warning);}
#answer-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-family:var(--mono);font-size:1.2rem;color:var(--text);letter-spacing:0.1em;text-transform:uppercase;outline:none;transition:border-color 0.15s;}
#answer-input:focus{border-color:#3a3a3a;}
#answer-input:disabled{opacity:0.5;}
#answer-input.ic{border-color:var(--success);}
#answer-input.iw{border-color:var(--danger);}
.ans-meta{font-size:0.7rem;color:var(--muted);font-family:var(--mono);margin-top:6px;}
#feedback{min-height:22px;font-size:0.83rem;font-family:var(--mono);margin-top:8px;}
.fc{color:var(--success);}.fw{color:var(--danger);}.fm{color:var(--muted2);}
#reveal-text{font-family:var(--mono);font-size:0.85rem;color:var(--muted2);margin-top:6px;min-height:18px;}
.rw{color:var(--text);font-weight:500;}
.btn-row{display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap;}
.btn{padding:9px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--muted2);cursor:pointer;font-family:var(--mono);font-size:0.78rem;transition:all 0.15s;}
.btn:hover{border-color:#3a3a3a;color:var(--text);}
.btn:active{transform:scale(0.97);}
#progress-bar-wrap{height:2px;background:var(--surface2);border-radius:1px;margin-bottom:1.5rem;overflow:hidden;}
#progress-bar{height:2px;background:var(--border);border-radius:1px;transition:width 0.4s;}
#empty-state{text-align:center;padding:2.5rem 1rem;font-family:var(--mono);color:var(--muted2);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;display:none;}
#empty-state p:first-child{font-size:0.9rem;color:var(--text);margin-bottom:0.5rem;}
#empty-state p{font-size:0.78rem;}
#empty-state span{color:var(--accent);}
.solve-progress{font-size:0.68rem;font-family:var(--mono);color:var(--muted2);margin-top:4px;}
.def-box{margin-top:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:2px solid var(--border);font-size:0.78rem;color:var(--muted2);font-family:var(--sans);line-height:1.5;min-height:0;}
.def-word{font-family:var(--mono);font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;}
.solve-pip{display:inline-block;width:8px;height:8px;border-radius:50%;border:1px solid var(--muted);margin-right:3px;}
.solve-pip.filled{background:var(--success);border-color:var(--success);}
#overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.5);}
body{
  padding-left:calc(56px + 1rem);
  transition:padding-left 0.25s cubic-bezier(0.4,0,0.2,1);
}
@media(max-width:600px){
  #sidebar{position:fixed;z-index:200;}
  #sidebar.open{width:80vw;max-width:280px;}
  #sidebar.open~#overlay{display:block;}
  body{padding-left:calc(56px + 0.5rem);}
  body.sb-open{padding-left:calc(56px + 0.5rem);}
}
@media(min-width:601px){
  #overlay{display:none!important;}
  body.sb-open{padding-left:calc(240px + 1.5rem);}
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-toggle" onclick="toggleSidebar()">
    <span id="sidebar-toggle-icon">&#8250;</span>
    <span id="sidebar-toggle-label">modes</span>
  </div>
  <div id="sidebar-content">
    <div class="sb-section">my list</div>
    <button class="sb-btn active-easy" id="btn-easy" onclick="pickMode('easy')">
      <span class="sb-name">easy</span><span class="sb-sub">word + letter · 10s</span>
    </button>
    <button class="sb-btn" id="btn-hard" onclick="pickMode('hard')">
      <span class="sb-name">hard</span><span class="sb-sub">all scrambled · 30s</span>
    </button>
    <div class="sb-section">most common</div>
    <button class="sb-btn" id="btn-mc-easy" onclick="pickMode('mc-easy')">
      <span class="sb-name">easy</span><span class="sb-sub">word + letter · 10s</span>
    </button>
    <button class="sb-btn" id="btn-mc-hard" onclick="pickMode('mc-hard')">
      <span class="sb-name">hard</span><span class="sb-sub">all scrambled · 30s</span>
    </button>
    <div class="sb-section">incorrect <span class="wb" id="wb-all">0</span></div>
    <button class="sb-btn" id="btn-wrong-easy" onclick="pickMode('wrong-easy')">
      <span class="sb-name">easy</span><span class="sb-sub">word + letter · 10s</span>
    </button>
    <button class="sb-btn" id="btn-wrong-hard" onclick="pickMode('wrong-hard')">
      <span class="sb-name">hard</span><span class="sb-sub">all scrambled · 30s</span>
    </button>
  </div>
</div>
<div id="overlay" onclick="closeSidebar()"></div>

<header>
  <div class="countdown-title" aria-label="stemming">
    <span class="countdown-tile">S</span>
    <span class="countdown-tile">T</span>
    <span class="countdown-tile">E</span>
    <span class="countdown-tile">M</span>
    <span class="countdown-tile">M</span>
    <span class="countdown-tile">I</span>
    <span class="countdown-tile">N</span>
    <span class="countdown-tile">G</span>
  </div>
  <div id="mode-label" class="ml-easy">my list — easy</div>
</header>
<div class="container">

  <div id="progress-bar-wrap"><div id="progress-bar" style="width:0%"></div></div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-val" id="streak">0</div></div>
    <div class="stat"><div class="stat-label">Round</div><div class="stat-val" id="round">1</div></div>
  </div>

  <div id="empty-state">
    <p>no incorrect answers yet</p>
    <p>play any mode — misses and reveals get saved here</p>
  </div>

  <div id="game-area">
    <div class="card">
      <div class="card-label" id="puzzle-label">base word</div>
      <div id="badge-ff" class="badge bff" style="display:none">false friend</div>
      <div id="badge-wr" class="badge bwr" style="display:none">from incorrect list</div>
      <div id="badge-mc" class="badge bmc" style="display:none">most common</div>
      <div id="easy-section"><div id="base-display"></div></div>
      <div id="hard-section" style="display:none"><div id="scrambled-display"></div></div>
      <div class="solve-progress" id="solve-progress" style="display:none"></div>
    </div>

    <div class="card">
      <div class="card-label">your answer</div>
      <div class="timer-row">
        <div class="timer-num" id="timer-num">10</div>
        <div class="timer-track"><div id="timer-bar"></div></div>
      </div>
      <div class="typing-indicator" id="typing-ind"></div>
      <input id="answer-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="start typing...">
      <div class="ans-meta" id="ans-meta"></div>
      <div id="feedback"></div>
      <div id="reveal-text"></div>
      <div class="def-box" id="def-box" style="display:none"><div class="def-word" id="def-word"></div><div id="def-text"></div></div>
    </div>

    <div class="btn-row">
      <button class="btn" onclick="revealAnswer()">reveal</button>
      <button class="btn" onclick="nextPuzzle()">skip →</button>
    </div>
  </div>
</div>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function filterValid(arr){
  return arr.filter(p=>{
    if(p[3])return true;
    const src=(p[0]+p[1]).toLowerCase().split("").sort().join("");
    return p[2].some(a=>a.toLowerCase().split("").sort().join("")===src);
  });
}

const stdPuzzles=filterValid(STANDARD);
const mcPuzzles=filterValid(MOST_COMMON);

// ── WRONG LIST (shared, with solve counts) ────────────────────────────────────
const WRONG_KEY='stemming_wrong_v3';
const SOLVE_KEY='stemming_solves_v3';

function loadWrong(){try{return JSON.parse(localStorage.getItem(WRONG_KEY)||'[]')}catch(e){return[]}}
function saveWrong(a){localStorage.setItem(WRONG_KEY,JSON.stringify(a))}
function loadSolves(){try{return JSON.parse(localStorage.getItem(SOLVE_KEY)||'{}')}catch(e){return{}}}
function saveSolves(o){localStorage.setItem(SOLVE_KEY,JSON.stringify(o))}

function pkey(p){return p[0]+'||'+p[1]+'||'+p[2].join(',')}

function addToWrong(p){
  const arr=loadWrong(),k=pkey(p);
  if(!arr.find(x=>pkey(x)===k)){arr.push(p);saveWrong(arr);}
  updateBadges();
}

function recordCorrect(p){
  const k=pkey(p);
  const solves=loadSolves();
  solves[k]=(solves[k]||0)+1;
  if(solves[k]>=2){
    // remove from wrong list
    const arr=loadWrong().filter(x=>pkey(x)!==k);
    saveWrong(arr);
    delete solves[k];
  }
  saveSolves(solves);
  updateBadges();
}

function getSolveCount(p){
  const solves=loadSolves();
  return solves[pkey(p)]||0;
}

function updateBadges(){
  const n=loadWrong().length;
  document.getElementById('wb-all').textContent=n;
}

// ── MODE CONFIG ───────────────────────────────────────────────────────────────
const TMAX={'easy':10,'hard':30,'mc-easy':10,'mc-hard':30,'wrong-easy':10,'wrong-hard':30};
const ISCRAM={'easy':false,'hard':true,'mc-easy':false,'mc-hard':true,'wrong-easy':false,'wrong-hard':true};
const ISWRONG={'wrong-easy':true,'wrong-hard':true};
const ISMC={'mc-easy':true,'mc-hard':true};
const TYPING_WINDOW=5;

let mode='easy';
let orders={easy:[],hard:[],'mc-easy':[],'mc-hard':[],'wrong-easy':[],'wrong-hard':[]};
let idx=0,score=0,streak=0,roundNum=1;
let mainIv=null,typingIv=null;
let mainTime=10,typingTime=TYPING_WINDOW;
let phase='main';
let current=null;

function getBaseList(m){
  if(ISWRONG[m])return loadWrong();
  if(ISMC[m])return mcPuzzles;
  return stdPuzzles;
}

function resetOrder(m){
  const list=getBaseList(m);
  orders[m]=shuffle([...Array(list.length).keys()]);
}

const MODE_LABELS={
  'easy':       {text:'my list — easy',        cls:'ml-easy'},
  'hard':       {text:'my list — hard',        cls:'ml-hard'},
  'mc-easy':    {text:'most common — easy',    cls:'ml-mc-easy'},
  'mc-hard':    {text:'most common — hard',    cls:'ml-mc-hard'},
  'wrong-easy': {text:'incorrect — easy',      cls:'ml-wrong-easy'},
  'wrong-hard': {text:'incorrect — hard',      cls:'ml-wrong-hard'},
};

function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  sb.classList.toggle('open');
  if(window.innerWidth>600){
    document.body.classList.toggle('sb-open', sb.classList.contains('open'));
  }
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.body.classList.remove('sb-open');
}
function pickMode(m){
  closeSidebar();
  setMode(m);
}

function setMode(m){
  mode=m;
  const cls={
    'easy':'active-easy','hard':'active-hard',
    'mc-easy':'active-mc-easy','mc-hard':'active-mc-hard',
    'wrong-easy':'active-wrong-easy','wrong-hard':'active-wrong-hard'
  };
  ['easy','hard','mc-easy','mc-hard','wrong-easy','wrong-hard'].forEach(id=>{
    const el=document.getElementById('btn-'+id);
    if(el){el.className='sb-btn';}
  });
  const el=document.getElementById('btn-'+m);
  if(el)el.classList.add(cls[m]);
  const lbl=document.getElementById('mode-label');
  const ml=MODE_LABELS[m];
  lbl.textContent=ml.text;
  lbl.className=ml.cls;

  score=0;streak=0;roundNum=1;idx=0;
  document.getElementById('score').textContent=0;
  document.getElementById('streak').textContent=0;

  if(ISWRONG[m]){
    const w=loadWrong();
    if(w.length===0){
      document.getElementById('game-area').style.display='none';
      document.getElementById('empty-state').style.display='block';
      return;
    }
  }
  document.getElementById('game-area').style.display='';
  document.getElementById('empty-state').style.display='none';
  resetOrder(m);
  loadPuzzle();
}

function scramble(s){return shuffle(s.toUpperCase().split("")).join(" ");}

function loadPuzzle(){
  const list=getBaseList(mode);
  if(!orders[mode]||orders[mode].length===0)resetOrder(mode);
  if(idx>=orders[mode].length){resetOrder(mode);idx=0;}

  // refresh list for wrong mode (may have changed)
  const freshList=getBaseList(mode);
  if(freshList.length===0){
    document.getElementById('game-area').style.display='none';
    document.getElementById('empty-state').style.display='block';
    return;
  }
  if(idx>=orders[mode].length){resetOrder(mode);idx=0;}
  current=getBaseList(mode)[orders[mode][idx]];

  phase='main';
  clearInterval(mainIv);clearInterval(typingIv);
  mainTime=TMAX[mode];typingTime=TYPING_WINDOW;

  const inp=document.getElementById('answer-input');
  inp.value='';inp.disabled=false;inp.className='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='';
  document.getElementById('reveal-text').textContent='';
  document.getElementById('round').textContent=roundNum;
  document.getElementById('ans-meta').textContent=current[2][0].length+' letters';
  document.getElementById('typing-ind').textContent='';
  document.getElementById('typing-ind').className='typing-indicator';
  document.getElementById('def-box').style.display='none';

  const ff=current[3];
  const isWrong=!!ISWRONG[mode];
  const isMC=!!ISMC[mode];

  document.getElementById('badge-ff').style.display=ff?'inline-block':'none';
  document.getElementById('badge-wr').style.display=isWrong?'inline-block':'none';
  document.getElementById('badge-mc').style.display=(!isWrong&&isMC)?'inline-block':'none';

  // solve progress for wrong mode
  const sp=document.getElementById('solve-progress');
  if(isWrong){
    const n=getSolveCount(current);
    sp.style.display='block';
    sp.innerHTML=`<span class="solve-pip ${n>=1?'filled':''}"></span><span class="solve-pip ${n>=2?'filled':''}"></span> ${n}/2 correct to remove`;
  } else {
    sp.style.display='none';
  }

  if(!ISCRAM[mode]){
    document.getElementById('easy-section').style.display='';
    document.getElementById('hard-section').style.display='none';
    document.getElementById('puzzle-label').textContent=ff?'this word is a false friend:':'base word + new letter';
    if(ff){
      document.getElementById('base-display').textContent=current[0].toUpperCase();
    } else {
      const nlClass=isMC&&!isWrong?'nl-purple':'nl';
      const badges=current[1].toUpperCase().split("").map(l=>`<span class="${nlClass}">${l}</span>`).join('');
      document.getElementById('base-display').innerHTML=current[0].toUpperCase()+' + '+badges;
    }
  } else {
    document.getElementById('easy-section').style.display='none';
    document.getElementById('hard-section').style.display='';
    document.getElementById('puzzle-label').textContent=ff?'unscramble — false friend':'unscramble all letters';
    document.getElementById('scrambled-display').textContent=scramble(current[0]+current[1]);
  }

  document.getElementById('timer-num').textContent=Math.ceil(mainTime);
  updateBar(mainTime,TMAX[mode]);
  mainIv=setInterval(tickMain,100);
  inp.focus();

  const total=getBaseList(mode).length;
  document.getElementById('progress-bar').style.width=Math.round((idx/Math.max(total,1))*100)+'%';
}

function tickMain(){
  mainTime=Math.max(0,mainTime-0.1);
  document.getElementById('timer-num').textContent=Math.ceil(mainTime);
  updateBar(mainTime,TMAX[mode]);
  if(mainTime<=0){clearInterval(mainIv);timeUp();}
}

function tickTyping(){
  typingTime=Math.max(0,typingTime-0.1);
  document.getElementById('timer-num').textContent=Math.ceil(typingTime);
  updateBar(typingTime,TYPING_WINDOW);
  if(typingTime<=0){clearInterval(typingIv);timeUp();}
}

function updateBar(t,max){
  const pct=(t/max)*100;
  const bar=document.getElementById('timer-bar');
  bar.style.width=Math.max(0,pct)+'%';
  const r=t/max;
  bar.style.background=r>0.5?'#c8f560':r>0.25?'#f0a04b':'#ff5c5c';
}

function startTypingPhase(){
  if(phase!=='main')return;
  phase='typing';
  clearInterval(mainIv);
  typingTime=TYPING_WINDOW;
  document.getElementById('typing-ind').textContent='5s to answer';
  document.getElementById('typing-ind').className='typing-indicator active';
  typingIv=setInterval(tickTyping,100);
}

function timeUp(){
  if(phase==='done')return;
  phase='done';
  streak=0;document.getElementById('streak').textContent=0;
  const inp=document.getElementById('answer-input');
  inp.disabled=true;inp.className='iw';
  setFb('time up','fm');
  document.getElementById('typing-ind').textContent='';
  addToWrong(current);
  showAns();
}

function showDef(words){
  const db=document.getElementById('def-box');
  const dw=document.getElementById('def-word');
  const dt=document.getElementById('def-text');
  const hits=words.map(w=>DEFS[w.toUpperCase()]).filter(Boolean);
  if(hits.length>0){
    dw.textContent=words.map(w=>w.toUpperCase()).join(' / ');
    dt.textContent=hits[0];
    db.style.display='block';
  } else {
    db.style.display='none';
  }
}

function showAns(){
  const words=current[2].map(w=>`<span class="rw">${w.toUpperCase()}</span>`).join(' / ');
  document.getElementById('reveal-text').innerHTML='→ '+words;
  showDef(current[2]);
}

function setFb(txt,cls){
  const el=document.getElementById('feedback');
  el.textContent=txt;el.className=cls;
}

document.getElementById('answer-input').addEventListener('input',function(){
  if(phase==='done')return;
  const val=this.value.trim().toLowerCase();
  if(val.length>0&&phase==='main')startTypingPhase();
  if(current[2].map(a=>a.toLowerCase()).includes(val)){
    clearInterval(mainIv);clearInterval(typingIv);
    phase='done';score++;streak++;
    document.getElementById('score').textContent=score;
    document.getElementById('streak').textContent=streak;
    this.disabled=true;this.className='ic';
    setFb('correct','fc');
    document.getElementById('typing-ind').textContent='';
    updateBar(1,1);
    document.getElementById('timer-num').textContent='✓';
    showDef(current[2]);
    if(ISWRONG[mode])recordCorrect(current);
    setTimeout(nextPuzzle,1400);
  }
});

function revealAnswer(){
  if(phase==='done')return;
  clearInterval(mainIv);clearInterval(typingIv);
  phase='done';streak=0;
  document.getElementById('streak').textContent=0;
  const inp=document.getElementById('answer-input');
  inp.disabled=true;inp.className='iw';
  document.getElementById('typing-ind').textContent='';
  setFb('revealed','fm');
  addToWrong(current);
  showAns();
}

function nextPuzzle(){idx++;roundNum++;loadPuzzle();}

updateBadges();
setMode('easy');
</script>
